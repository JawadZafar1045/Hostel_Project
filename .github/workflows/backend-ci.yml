name: Backend CI/CD

on:
  push:
    branches: ["**"]
    paths:
      - "backend/**"        # Only triggers when backend files change
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"

jobs:
  check:
    if: false
    name: Lint & Build Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend  # All npm commands run inside /backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Syntax check
        run: node --check src/app.js
        env:
          NODE_ENV: test

  # CD — only fires on merge to main, only if CI passes
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deployment
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"