name: Frontend CI/CD

on:
  push:
    branches: ["**"]
    paths:
      - "frontend/**"       # Only triggers when frontend files change
  pull_request:
    branches: [main, develop]
    paths:
      - "frontend/**"

jobs:
  check:
    name: Lint & Build Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend  # All npm commands run inside /frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://placeholder.example.com

  # CD — only fires on merge to main, only if CI passes
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Vercel deployment
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"